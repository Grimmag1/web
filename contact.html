<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC OKNA & DVEŘE</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact.html">

<div id="header-placeholder"></div>

<!-- ===== PAGE HEADER ===== -->
<div class="page-header">
    <h1>Kontakt</h1>
</div>

<!-- ===== CONTACT ===== -->
<section class="content-section">
    <div class="contact-container">
        <div class="contact-info">
            <h2>Kontaktní údaje</h2>
            <div class="info-item">
                <strong>📍 Adresa:</strong>
                <p>Přerov, Česká republika</p>
            </div>
            <div class="info-item">
                <strong>🚘 Působnost:</strong>
                <p>po celé ČR</p>
            </div>
            <div class="info-item">
                <strong>📞 Telefon:</strong>
                <p>+420 739 249 434</p>
            </div>
            <div class="info-item">
                <strong>✉️ Email:</strong>
                <p>martin.cepica@email.cz</p>
            </div>
        </div>

        <div class="contact-form-wrapper">
            <h2>Napište nám</h2>
            <form id="contact-form" action="https://formspree.io/f/mzdjzjzv" method="POST">
                <div class="form-group">
                    <label for="jmeno">Jméno *</label>
                    <input type="text" id="jmeno" name="jmeno" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="telefon">Telefon *</label>
                    <input type="tel" id="telefon" name="telefon" required>
                </div>
                <div class="form-group">
                    <label for="zprava">Zpráva *</label>
                    <textarea id="zprava" name="zprava" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Odeslat zprávu</button>
            </form>
        </div>
    </div>
</section>

<div id="footer-placeholder"></div>

<script src="script.js"></script>

</body>
</html>
